stages:
  - test
  - build
  - deploy

variables:
  GO_VERSION: "1.22"
  REGISTRY_IMAGE: "$CI_REGISTRY_IMAGE"

# Test stage
test:
  stage: test
  image: golang:1.22-alpine
  before_script:
    - for i in 1 2 3 4 5; do apk add --no-cache git make && break || echo "Attempt $i failed, retrying in 5s..." && sleep 5; done
  script:
    - go test -v -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.out
    paths:
      - coverage.out
    expire_in: 30 days
  coverage: '/coverage: \d+.\d+%/'

test:lint:
  stage: test
  image: golang:1.22-alpine
  before_script:
    - for i in 1 2 3 4 5; do apk add --no-cache golangci-lint git && break || echo "Attempt $i failed, retrying in 5s..." && sleep 5; done
  script:
    - golangci-lint run ./...
  allow_failure: true

# Build stage
build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $REGISTRY_IMAGE:$CI_COMMIT_SHA
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        docker tag $REGISTRY_IMAGE:$CI_COMMIT_SHA $REGISTRY_IMAGE:latest
        docker push $REGISTRY_IMAGE:latest
      fi
  only:
    - main
    - develop

build:binary:
  stage: build
  image: golang:1.22-alpine
  before_script:
    - for i in 1 2 3 4 5; do apk add --no-cache make && break || echo "Attempt $i failed, retrying in 5s..." && sleep 5; done
  script:
    - make build
  artifacts:
    paths:
      - bin/coldforge-drive
    expire_in: 30 days

# Tagged releases (semver only)
build:release:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $REGISTRY_IMAGE:$CI_COMMIT_TAG .
    - docker push $REGISTRY_IMAGE:$CI_COMMIT_TAG
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# Deploy stage
deploy:staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - for i in 1 2 3 4 5; do apk add --no-cache curl && break || echo "Attempt $i failed, retrying in 5s..." && sleep 5; done
  script:
    - echo "Staging deployment would go here"
    - echo "Using image: $REGISTRY_IMAGE:$CI_COMMIT_SHA"
  only:
    - develop
  when: manual

deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - for i in 1 2 3 4 5; do apk add --no-cache curl && break || echo "Attempt $i failed, retrying in 5s..." && sleep 5; done
  script:
    - echo "Production deployment would go here"
    - echo "Using image: $REGISTRY_IMAGE:latest"
  only:
    - main
  when: manual

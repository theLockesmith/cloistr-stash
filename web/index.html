<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive - Coldforge</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-left">
                <h1 class="logo">Drive</h1>
            </div>
            <div class="header-right">
                <span id="user-pubkey" class="user-pubkey"></span>
                <button id="login-btn" class="btn btn-primary">Connect</button>
            </div>
        </header>

        <main class="main">
            <div class="toolbar">
                <button id="upload-btn" class="btn btn-primary" disabled>
                    <span class="icon">+</span> Upload
                </button>
                <button id="new-folder-btn" class="btn" disabled>
                    <span class="icon">+</span> New Folder
                </button>
                <div class="breadcrumb" id="breadcrumb">
                    <span class="breadcrumb-item" data-path="/">/</span>
                </div>
            </div>

            <div class="content">
                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <p class="drop-zone-text">Drag and drop files here</p>
                        <p class="drop-zone-subtext">or click Upload to select files</p>
                    </div>
                </div>

                <div id="file-list" class="file-list">
                    <div class="file-list-header">
                        <div class="file-col file-name">Name</div>
                        <div class="file-col file-size">Size</div>
                        <div class="file-col file-date">Modified</div>
                        <div class="file-col file-actions"></div>
                    </div>
                    <div id="file-list-body" class="file-list-body">
                        <div class="empty-state" id="empty-state">
                            <p>No files yet</p>
                            <p class="empty-state-subtext">Upload files to get started</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div id="upload-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Upload Files</h2>
                    <button class="modal-close" id="upload-modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <input type="file" id="file-input" multiple hidden>
                    <div id="upload-drop-zone" class="upload-drop-zone">
                        <p>Drag files here or click to select</p>
                    </div>
                    <div id="upload-list" class="upload-list"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn" id="upload-cancel">Cancel</button>
                    <button class="btn btn-primary" id="upload-start" disabled>Upload</button>
                </div>
            </div>
        </div>

        <div id="toast-container" class="toast-container"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/upload.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>

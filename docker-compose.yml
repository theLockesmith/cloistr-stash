services:
  coldforge-drive:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coldforge-drive
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.example.yml:/app/config.yml
    environment:
      DRIVE_HOST: "0.0.0.0"
      DRIVE_PORT: "8080"
      DRIVE_PUBLIC_URL: "http://localhost:8080"
      DRIVE_BLOSSOM_URL: "http://host.docker.internal:8085"
      DRIVE_RELAY_URL: "wss://relay.damus.io"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    extra_hosts:
      - "host.docker.internal:host-gateway"

# Note: This assumes coldforge-blossom is running separately on port 8085
# If running Blossom in Docker too, add it here and update DRIVE_BLOSSOM_URL

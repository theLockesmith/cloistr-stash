services:
  coldforge-drive:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coldforge-drive
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.example.yml:/app/config.yml
    environment:
      DRIVE_HOST: "0.0.0.0"
      DRIVE_PORT: "8080"
      DRIVE_PUBLIC_URL: "https://drive.cloistr.xyz"
      DRIVE_BLOSSOM_URL: "https://blossom.cloistr.xyz"
      DRIVE_RELAY_URL: "wss://relay.cloistr.xyz"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

# cloistr-stash configuration

server:
  # HTTP server bind address
  host: "0.0.0.0"
  # HTTP server port
  port: 8080
  # Public URL for the Stash UI
  public_url: "https://stash.cloistr.xyz"

# Blossom backend server (file storage)
blossom:
  # URL of the hosted Blossom server
  url: "https://blossom.cloistr.xyz"

# Nostr relay for file/folder metadata
relay:
  # Relay URL for publishing and querying metadata events
  url: "wss://relay.cloistr.xyz"

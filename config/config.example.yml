# coldforge-drive configuration

server:
  # HTTP server bind address
  host: "0.0.0.0"
  # HTTP server port
  port: 8080
  # Public URL for the Drive UI
  public_url: "https://drive.coldforge.xyz"

# Blossom backend server (file storage)
blossom:
  # URL of the hosted Blossom server
  url: "https://blossom.coldforge.xyz"

# Nostr relay for file/folder metadata
relay:
  # Relay URL for publishing and querying metadata events
  url: "wss://relay.coldforge.xyz"

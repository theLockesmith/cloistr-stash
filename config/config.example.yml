# Coldforge Files (Blossom) Server Configuration

server:
  # HTTP server bind address
  host: "0.0.0.0"
  # HTTP server port
  port: 8080

storage:
  # Storage backend type: "filesystem" or "ceph"
  type: "filesystem"

  # Filesystem storage configuration
  filesystem:
    # Base path for storing files
    path: "./data"

# Authentication configuration
auth:
  # NIP-46 relay URL for verifying signatures
  relay_url: "wss://relay.example.com"

# Blossom protocol configuration
blossom:
  # Public URL where users can download files
  # Used in upload responses and event tags
  public_url: "https://blossom.coldforge.xyz"
